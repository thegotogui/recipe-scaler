If you don’t mind, allow me to vent for a moment. (Or feel free to skip completely in favor of ANYTHING else you should be doing.)

Two years ago (almost exactly), Shona got the itch to buy a treadmill. Mind you, she does not routinely run (or walk) WITHOUT one, but I am hard-pressed to disagree with the desire to exercise. (My ex came mighty close to being an Olympic-grade beach volleyball player back in college so I’m supportive of the concept, but I also know that, if you don’t have the discipline, a treadmill won’t give it to you.)

I should note that she had just sold a $900(!) exercise bike ATTACHMENT on eBay so the cash was, of course, burning a hole in her pocket. She assured me she would leverage that money for the treadmill. She neglected to mention that she’d throw another $400 on top of that for it.

I was completely omitted from the purchasing decision. I was simply told that it would be arriving “soon”. (It arrived the afternoon after my doctor-recommended colonoscopy, which is a more modest procedure than you’d think, but for which they give you glorious meds that allow you to blissfully forget the whole thing.

She neglected to recognize two things about this new device:
1. It had a PROPRIETARY software/subscription package, which meant you couldn’t use ANY other software or service with it.
2. It weighed 300 pounds, making it almost impossible to get down the stairs by mortal humans.

So, it had a fraction of the functionality THAT WE AGREED IT SHOULD HAVE – AND – it now occupied a third of our sitting room, which has an irony all its own.

We listed it on Craigslist 4-5 months ago for HALF of what we paid for it and, miraculously, had someone interested who picked it up on Thursday of last week. Done!

I had been tempted to say, “Okay, let’s face it, that purchase was a financial and logistical disaster; one that ‘we’ shouldn’t repeat again”, but hadn’t gotten around to it.

I was informed just before the morning meeting, while she was away from the house (notably) that:
1. A new (used) one would be arriving today and
2. I shouldn’t worry; she used the money from the previous one for this one.


