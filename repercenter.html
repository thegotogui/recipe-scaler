<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
	<title>Repercenter</title>
	<link rel="icon" type="image/svg+xml" href="./app_icons/martini.svg">


	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx"
		crossorigin="anonymous">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-A3rJD856KowSb7dwlZdYEkO39Gagi7vIsF0jrRAoQmDKKtQBHUuLZ9AsSv4jD4Xa"
		crossorigin="anonymous">
		</script>

	<script src="js/scripts.js"></script>
	<script src="repercenter.js"></script>

	<style>
		body {
			/* background: url('./assets/img/nailsntini.jpg'); */
			background-size: auto;
			background-repeat: no-repeat;
			background-color: rgb(0, 28, 50);
			color: white;
		}

		label {
			font-size: 26px;
			color: white;
		}

		.form-control,
		.form-select {
			background-color: #10151f;
			color: white;
			font-size: 26px;
			border: none;
			text-align: center;
		}

		/* 
Cocktail Bar Charts
*/
		.bg-liquor,
		.bg-vermouth,
		.bg-water,
		.bg-ingenium,
		.bg-italicus {
			color: white;
			font-size: 12pt;
			font-weight: bold;
		}

		.bg-liquor {
			background-color: rgb(185, 186, 188);
			color: black;
		}

		.bg-vermouth {
			background-color: rgba(231, 211, 140, 1);
			color: black;
		}

		.bg-water {
			background-color: rgba(100, 145, 197, 1);
		}

		.bg-ingenium {
			background-color: rgb(189, 165, 160);
		}

		.bg-italicus {
			background-color: rgb(71, 150, 116);
		}

		#waterField #vermouthField {
			font-weight: bold;
		}

		.contact-clean form {
			background-color: rgba(0, 28, 48, 0.8);
		}

		@media screen and (max-width: 900px) {
			.container {
				background-color: rgba(0, 28, 48, 0.8);
				color: rgb(185, 186, 188);
				margin-top: 2rem;
				padding: 2rem;
				border-radius: 1rem;
			}

			.flexible {
				display: flex-wrap;
			}
		}

		@media screen and (min-width: 768px) {
			.container {
				background-color: rgba(0, 28, 48, 0.5);
				color: rgb(185, 186, 188);
				margin-top: 2rem;
				padding: 2rem;
				border-radius: 1rem;
			}

			.flexible {
				display: flex-wrap;
			}
		}

		@media screen and (max-width: 768px) {
			.container {
				background-color: rgba(0, 28, 48, 0.5);
				color: rgb(185, 186, 188);
				margin-top: 2rem;
				padding: 2rem;
				border-radius: 1rem;
			}

			.flexible {
				display: flex-wrap;
			}
		}

		.row,
		.form-row {
			margin-top: 1rem;
		}

		.icons {
			padding: 0px 20px 0px 20px;
		}
	</style>

	<link rel="stylesheet" href="css/navigation.css">
</head>

<body onload="initializeIt('Repercenter!', 'repercenter.svg'); calculateItAll();">

	<div id="navHead">
	</div>

	<div class="container" style="max-width: 850px;">

		<form method="post">

			<!-- Recipe ingredient fields -->
			<h2 class="text-center" style="margin-bottom: 0px; margin-top: 26px; color: white;">Original Volume</h2>

			<div class="row justify-content-md-center">
				<div class="col-md-6">
					<!-- <label id="ratioLabel">Orig Volume</label> -->
					<input class="form-control" step="1" type="number" id="origVolume" placeholder="" value="100" oninput="calculateItAll();">
					<!-- <input class="checkbox" style="margin-top: 10px;" type="checkbox" name="refresh" id="refresher" checked class="checkbox">Refresh -->
				</div>
			</div>

			<!-- Row 1-->

			<h2 class="text-center" style="margin-bottom: 0px; margin-top: 26px; color: white;">Original Percentages</h2>
			<div class="form-row justify-content-md-center" style="display: flex;">
				<div class="form-group col-md-5 col-sm-6 col-xs-6" style="margin-right: 15px;">
					<!-- <label>Original Percentages</label> -->
					<input class="form-control right" type="number" id="oPercent1" value="40" oninput="calculateItAll('p1');">
				</div>
				<div class="form-group col-md-5 col-sm-6 col-xs-6" style="margin-left: 0px;">
					<input class="form-control right" type="number" id="oPercent2" value="60" oninput="calculateItAll('p2');">
				</div>
			</div>
			<h2 class="text-center" style="margin-bottom: 0px; margin-top: 26px; color: white;">Original Values</h2>

			<div class="form-row justify-content-md-center" style="display: flex;">
				<div class="form-group col-md-5 col-sm-6" style="margin-right: 15px;">
					<input class="form-control right" type="number" id="oValue1">
				</div>
				<div class="form-group col-md-5 col-sm-6" style="margin-left: 0px;">
					<input class="form-control right" type="number" id="oValue2">
				</div>
			</div>

			<h2 class="text-center" style="margin-bottom: 0px; margin-top: 26px; color: white;">Desired Percentages</h2>
			<div class="form-row justify-content-md-center" style="display: flex;">
				<div class="form-group col-md-5 col-sm-6" id="nPercentBorder1" style="margin-right: 15px; padding: 10px;">
					<input class="form-control left" type="number" id="nPercent1" value="15" oninput="calculateItAll('np1');">
				</div>
				<div class="form-group col-md-5 col-sm-6" id="nPercentBorder2" style="margin-left: 0px; padding: 10px; background-color: cornflowerblue;">
					<input class="form-control right" type="number" id="nPercent2" value="85" oninput="calculateItAll('np2');">
				</div>
			</div>

			<h2 class="text-center" style="margin-bottom: 0px; margin-top: 26px; color: white;">New Total Volume</h2>

			<div class="row justify-content-md-center">
				<div class="col-md-6" id="volumeOnly">
					<input class="form-control center" type="number" id="newVolume">
				</div>
			</div>

			<!--* New Quantities-->
			<h2 class="text-center" style="margin-bottom: 0px; margin-top: 26px; color: white;">New Amounts</h2>
			<div class="form-row justify-content-md-center" style="display: flex;">
				<div class="form-group col-md-5 col-sm-6" style="margin-right: 15px;">
					<input class="form-control left" type="number" id="newPort1" value="15" oninput="volumeBack(1)">
				</div>
				<div class="form-group col-md-5 col-sm-6" style="margin-left: 0px;">
					<input class="form-control right" type="number" id="newPort2" value="120" oninput="volumeBack(2)">
				</div>
			</div>

			<!--* Deltas -->
			<h2 class="text-center" style="margin-bottom: 0px; margin-top: 26px; color: white;">Adjustment</h2>
			<div class="form-row justify-content-md-center" style="display: flex;">
				<div class="form-group col-md-5 col-sm-6" id="deltaBorder1" style="margin-right: 15px; padding:10px;">
					<input class="form-control left" type="number" id="delta1" readonly>
				</div>
				<div class="form-group col-md-5 col-sm-6" id="deltaBorder2" style="margin-left: 0px; padding:10px;">
					<input class="form-control right" type="number" id="delta2" readonly>
				</div>
			</div>

			<!-- Bar Chart  -->
			<div class="justify-content-md-center" style="margin: 0 auto; display: flex;">
				<div class="progress col-md-8 col-sm-12" style="height: 50px; width: 50%; margin: 20px 10px;">
					<div class="progress-bar bg-liquor" id="gliquorbar" role="progressbar" style="width: 33.33%">
						<div class="percenters" id="glpercentageLabel"></div>
					</div>
					<div class="progress-bar bg-vermouth" id="gvermouthbar" role="progressbar" style="width: 33.33%">
						<div class="percenters" id="gvpercentageLabel"></div>
					</div>
					<div class="progress-bar bg-water" id="gwaterbar" role="progressbar" style="width: 33.33%">
						<div class="percenters" id="gwpercentageLabel"></div>
					</div>
				</div>
				<div class="progress col-md-8" style="height: 50px; width: 50%; margin: 20px 10px;">
					<div class="progress-bar bg-liquor" id="vliquorbar" role="progressbar" style="width: 0%">
						<div class="percenters" id="vlpercentageLabel"></div>
					</div>
					<div class="progress-bar bg-vermouth" id="vvermouthbar" role="progressbar" style="width: 0%">
						<div class="percenters" id="vvpercentageLabel"></div>
					</div>
					<div class="progress-bar bg-water" id="vwaterbar" role="progressbar" style="width: 0%">
						<div class="percenters" id="vwpercentageLabel"></div>
					</div>
				</div>
			</div>
		</form>
	</div>
</body>

</html>
