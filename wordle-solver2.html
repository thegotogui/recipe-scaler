<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle Permutation Helper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #628A55;
    --yellow: #B09E4D;
    --bg: #faf9f7;
    --surface: #ffffff;
    --border: #e2ddd8;
    --text: #1a1a18;
    --text-muted: #5c5854;
    --text-faint: #9a9590;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --badge-border: var(--bg);
  }

  html.dark {
    --bg: #18181a;
    --surface: #242428;
    --border: #38383c;
    --text: #f0ede8;
    --text-muted: #a8a4a0;
    --text-faint: #66625e;
    --badge-border: var(--bg);
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 24px 80px;
    transition: background 0.2s, color 0.2s;
  }

  .container { width: 100%; max-width: 600px; }

  /* HEADER */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 36px;
    gap: 16px;
  }
  .header-text { flex: 1; }
  .eyebrow {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.14em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  h1 {
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 16px;
    color: var(--text);
    line-height: 1.5;
    font-weight: 300;
  }

  /* HEADER CONTROLS */
  .header-controls {
    display: flex;
    gap: 8px;
    align-items: center;
    padding-top: 4px;
    flex-shrink: 0;
  }
  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .icon-btn:hover { background: var(--border); color: var(--text); }
  .icon-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* ROWS */
  .rows-area { margin-bottom: 8px; }

  .guess-block { margin-bottom: 20px; }

  .guess-label {
    font-family: var(--sans);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 12px;
  }
  html.dark .guess-label { color: #ffffff; }
  .guess-label span {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 400;
    color: var(--text-faint);
    margin-left: 10px;
    letter-spacing: 0.06em;
  }

  .tile-row {
    display: flex;
    gap: 10px;
  }

  .tile-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .pos-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.05em;
  }

  .tile {
    width: 60px; height: 60px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: border-color 0.12s, background 0.12s;
  }
  .tile input {
    width: 100%; height: 100%;
    border: none;
    background: transparent;
    text-align: center;
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    outline: none;
    text-transform: uppercase;
    caret-color: transparent;
    cursor: default;
    position: relative;
    z-index: 2;
  }
  .tile:focus-within {
    border-color: var(--text);
    box-shadow: 0 0 0 2px var(--text);
  }
  .tile[data-state="green"]:focus-within {
    border-color: #fff;
    box-shadow: 0 0 0 2px #fff;
  }
  .tile[data-state="yellow"]:focus-within {
    border-color: #fff;
    box-shadow: 0 0 0 2px #fff;
  }

  .tile[data-state="green"] { background: var(--green); border-color: var(--green); }
  .tile[data-state="green"] input { color: #fff; }
  .tile[data-state="yellow"] { background: var(--yellow); border-color: var(--yellow); }
  .tile[data-state="yellow"] input { color: #fff; }

  .state-badge {
    position: absolute;
    bottom: -5px; right: -5px;
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid var(--badge-border);
    display: none;
    z-index: 3;
    transition: border-color 0.2s;
  }
  .tile[data-state="green"] .state-badge { display: block; background: #4a6e3f; }
  .tile[data-state="yellow"] .state-badge { display: block; background: #5e6e30; }

  /* LEGEND + HINT */
  .meta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 32px;
    margin-top: 4px;
  }
  .legend { display: flex; gap: 20px; flex-wrap: wrap; }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; color: var(--text); font-weight: 400;
  }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; }
  .legend-swatch.green { background: var(--green); }
  .legend-swatch.yellow { background: var(--yellow); }
  .click-hint { font-size: 12px; color: var(--text-faint); font-family: var(--mono); }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin-bottom: 28px; }

  /* RESULTS */
  #results-section { display: none; }
  .results-header {
    display: flex; align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .results-title {
    font-size: 13px; font-family: var(--mono);
    color: var(--text);
    letter-spacing: 0.1em; font-weight: 500;
  }
  .results-count { font-family: var(--mono); font-size: 13px; color: var(--text-muted); }

  #patterns-grid { display: flex; flex-wrap: wrap; gap: 10px; }

  .pattern-chip {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 500;
    letter-spacing: 0.1em;
    padding: 10px 16px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    display: flex;
    gap: 1px;
    transition: background 0.2s, border-color 0.2s;
  }
  .pattern-chip.doubled {
    border-style: dashed;
    opacity: 0.75;
  }

  .pattern-chip .ch-green  { color: var(--green);      font-weight: 600; }
  .pattern-chip .ch-yellow { color: var(--yellow);     font-weight: 600; }
  .pattern-chip .ch-blank  { color: var(--text-faint); }

  .chip-wrapper {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  .chip-dismiss {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-faint);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    flex-shrink: 0;
  }
  .chip-dismiss:hover { background: #e55; border-color: #e55; color: #fff; }
  .chip-dismiss svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; }

    .empty-state { font-size: 14px; color: var(--text-faint); font-family: var(--mono); padding: 20px 0; }
  .results-note { font-size: 13px; color: var(--text-muted); font-family: var(--mono); margin-top: 16px; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-text">
      <p class="eyebrow">Wordle Tool</p>
      <h1>Permutation Helper</h1>
      <p class="subtitle">Enter clues across up to three guesses to narrow valid arrangements.</p>
    </div>
    <div class="header-controls">
      <button class="icon-btn" id="reset-btn" title="Reset all">
        <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      </button>
      <button class="icon-btn" id="dark-btn" title="Toggle dark mode">
        <svg id="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="icon-sun"  viewBox="0 0 24 24" style="display:none">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1"  x2="12" y2="3"/>  <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22"  x2="5.64" y2="5.64"/>  <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>   <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/> <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="rows-area" id="rows-area"></div>

  <div class="meta-row">
    <div class="legend">
      <div class="legend-item"><span class="legend-swatch green"></span>Correct position</div>
      <div class="legend-item"><span class="legend-swatch yellow"></span>Wrong position</div>
    </div>
    <p class="click-hint">1–5 jumps to guess 1 · press again to toggle green ↔ yellow</p>
  </div>

  <div class="divider"></div>

  <div id="results-section">
    <div class="results-header">
      <span class="results-title">Permutations</span>
      <span class="results-count" id="results-count"></span>
    </div>
    <div id="patterns-grid"></div>
    <p class="results-note">_ = unknown &nbsp;·&nbsp; colored letters are your clues</p>
  </div>

</div>
<script>
const WORD_LEN  = 5;
const NUM_ROWS  = 3;
const STATES    = ['', 'yellow', 'green'];

// Letters that cannot validly double in Wordle answers
const INVALID_DOUBLES = new Set(['H','I','J','K','Q','U','W','X','Y']);

let rowsData = makeRowsData();
function makeRowsData() {
  return Array.from({length: NUM_ROWS}, () =>
    Array.from({length: WORD_LEN}, () => ({ letter: '', state: '' }))
  );
}

/* ── BUILD UI ─────────────────────────────────────────────────────── */
function buildUI() {
  const area = document.getElementById('rows-area');
  area.innerHTML = '';
  for (let r = 0; r < NUM_ROWS; r++) {
    const block = document.createElement('div');
    block.className = 'guess-block';

    const lbl = document.createElement('div');
    lbl.className = 'guess-label';
    lbl.textContent = `Guess ${r + 1}`;
    if (r === 0) {
      const hint = document.createElement('span');
      hint.textContent = '(keys 1–5 to jump)';
      lbl.appendChild(hint);
    }

    const row = document.createElement('div');
    row.className = 'tile-row';
    row.id = `tile-row-${r}`;

    for (let c = 0; c < WORD_LEN; c++) {
      const wrap = document.createElement('div');
      wrap.className = 'tile-wrap';

      if (r === 0) {
        const posLbl = document.createElement('div');
        posLbl.className = 'pos-label';
        posLbl.textContent = c + 1;
        wrap.appendChild(posLbl);
      }

      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.state = rowsData[r][c].state;
      tile.dataset.row = r;
      tile.dataset.pos = c;

      const badge = document.createElement('div');
      badge.className = 'state-badge';

      const inp = document.createElement('input');
      inp.maxLength = 1;
      inp.setAttribute('aria-label', `Guess ${r+1} position ${c+1}`);
      inp.setAttribute('inputmode', 'text');
      inp.value = rowsData[r][c].letter;

      inp.addEventListener('keydown', e => {
        if (e.key === 'Backspace') {
          rowsData[r][c] = { letter: '', state: '' };
          tile.dataset.state = '';
          inp.value = '';
          dismissedPatterns = new Set();
          generate();
          e.preventDefault();
          return;
        }
        if (e.key.length === 1 && /[a-zA-Z]/.test(e.key)) {
          const ch = e.key.toUpperCase();
          inp.value = ch;
          rowsData[r][c].letter = ch;
          if (!rowsData[r][c].state) {
            rowsData[r][c].state = 'yellow';
            tile.dataset.state = 'yellow';
          }
          dismissedPatterns = new Set();
          generate();
          const nextTile = row.querySelector(`[data-pos="${c+1}"]`);
          if (nextTile) nextTile.querySelector('input').focus();
          e.preventDefault();
        }
      });

      tile.addEventListener('click', () => {
        if (!rowsData[r][c].letter) return;
        const cur  = STATES.indexOf(rowsData[r][c].state);
        const next = STATES[(cur + 1) % STATES.length];
        rowsData[r][c].state = next;
        tile.dataset.state   = next;
        dismissedPatterns = new Set();
        generate();
      });

      tile.appendChild(badge);
      tile.appendChild(inp);
      wrap.appendChild(tile);
      row.appendChild(wrap);
    }

    block.appendChild(lbl);
    block.appendChild(row);
    area.appendChild(block);
  }
}

/* ── RESET ────────────────────────────────────────────────────────── */
function resetAll() {
  dismissedPatterns = new Set();
  rowsData = makeRowsData();
  buildUI();
  document.getElementById('results-section').style.display = 'none';
  focusCell(0, 0);
}

function focusCell(r, c) {
  const tile = document.querySelector(`#tile-row-${r} [data-pos="${c}"]`);
  if (tile) tile.querySelector('input').focus();
}

/* ── CORE ALGORITHM ───────────────────────────────────────────────── */
function chooseUnorderedSubsets(arr, k) {
  if (k === 0) return [[]];
  if (arr.length < k) return [];
  const result = [];
  for (let i = 0; i <= arr.length - k; i++) {
    for (const sub of chooseUnorderedSubsets(arr.slice(i + 1), k - 1)) {
      result.push([arr[i], ...sub]);
    }
  }
  return result;
}

function buildTemplate(greens, assignment) {
  const map = {};
  greens.forEach(g => { map[g.pos] = { letter: g.letter, type: 'green' }; });
  assignment.forEach(a => { if (!map[a.pos]) map[a.pos] = { letter: a.letter, type: 'yellow' }; });
  return Array.from({length: WORD_LEN}, (_, i) =>
    map[i] ? `${map[i].type[0]}${map[i].letter}` : '__'
  ).join(',');
}

// Assign letter groups to free positions; returns a Set of encoded template strings
function runAssignment(groups, greens) {
  const greenPosSet = new Set(greens.map(g => g.pos));
  const freePos = [];
  for (let i = 0; i < WORD_LEN; i++) {
    if (!greenPosSet.has(i)) freePos.push(i);
  }
  const results = new Set();
  const go = (groupIdx, remainingFree, currentAssignment) => {
    if (groupIdx === groups.length) {
      results.add(buildTemplate(greens, currentAssignment));
      return;
    }
    const group = groups[groupIdx];
    for (const subset of chooseUnorderedSubsets(remainingFree, group.count)) {
      if (subset.some(pos => group.forbidden.has(pos))) continue;
      go(groupIdx + 1,
        remainingFree.filter(p => !subset.includes(p)),
        [...currentAssignment, ...subset.map(pos => ({ letter: group.letter, pos }))]
      );
    }
  };
  go(0, freePos, []);
  return results;
}

// For each eligible yellow letter, run assignment with count+1 and return new patterns only
function getDoubledVariants(baseSet, greens, yellows) {
  const extra = new Set();
  for (const y of yellows) {
    if (INVALID_DOUBLES.has(y.letter)) continue;
    const modified = yellows.map(yy =>
      yy.letter === y.letter ? { ...yy, count: yy.count + 1 } : yy
    );
    for (const p of runAssignment(modified, greens)) {
      if (!baseSet.has(p)) extra.add(p);
    }
  }
  return extra;
}

/* ── GENERATE ─────────────────────────────────────────────────────── */
function generate() {
  const greens    = [];
  const yellowMap = {};

  for (let r = 0; r < NUM_ROWS; r++) {
    for (let c = 0; c < WORD_LEN; c++) {
      const d = rowsData[r][c];
      if (!d.letter || !d.state) continue;
      if (d.state === 'green') {
        const existing = greens.findIndex(g => g.pos === c);
        if (existing >= 0) greens[existing] = { letter: d.letter, pos: c };
        else greens.push({ letter: d.letter, pos: c });
      } else if (d.state === 'yellow') {
        if (!yellowMap[d.letter]) yellowMap[d.letter] = new Set();
        yellowMap[d.letter].add(c);
      }
    }
  }

  for (const g of greens) {
    if (yellowMap[g.letter]) yellowMap[g.letter].delete(g.pos);
  }

  const yellowMaxCount = {};
  for (let r = 0; r < NUM_ROWS; r++) {
    const rowCounts = {};
    for (let c = 0; c < WORD_LEN; c++) {
      const d = rowsData[r][c];
      if (!d.letter || d.state !== 'yellow') continue;
      rowCounts[d.letter] = (rowCounts[d.letter] || 0) + 1;
    }
    for (const [letter, cnt] of Object.entries(rowCounts)) {
      yellowMaxCount[letter] = Math.max(yellowMaxCount[letter] || 0, cnt);
    }
  }

  const yellows = Object.entries(yellowMap).map(([letter, posSet]) => ({
    letter,
    count: yellowMaxCount[letter] || 1,
    forbidden: posSet
  }));

  const section = document.getElementById('results-section');
  if (!greens.length && !yellows.length) {
    section.style.display = 'none';
    return;
  }
  section.style.display = 'block';

  // Base patterns
  const baseSet = yellows.length
    ? runAssignment(yellows, greens)
    : new Set([buildTemplate(greens, [])]);

  // Doubled patterns (new ones only)
  const doubledSet = getDoubledVariants(baseSet, greens, yellows);

  // Merge: base first (doubled:false), then extra (doubled:true), sort together
  const allPatterns = [
    ...Array.from(baseSet).map(p   => ({ p, doubled: false })),
    ...Array.from(doubledSet).map(p => ({ p, doubled: true  }))
  ].sort((a, b) => a.p.localeCompare(b.p));

  renderResults(allPatterns);
}

/* ── RENDER ───────────────────────────────────────────────────────── */
let dismissedPatterns = new Set();

function makeChip(p, doubled) {
  const wrapper = document.createElement('div');
  wrapper.className = doubled ? 'chip-wrapper doubled' : 'chip-wrapper';

  const dismissBtn = document.createElement('button');
  dismissBtn.className = 'chip-dismiss';
  dismissBtn.title = 'Remove this pattern';
  dismissBtn.innerHTML = `<svg viewBox="0 0 10 10"><line x1="2" y1="2" x2="8" y2="8"/><line x1="8" y1="2" x2="2" y2="8"/></svg>`;
  dismissBtn.addEventListener('click', () => {
    dismissedPatterns.add(p);
    wrapper.remove();
    const grid = document.getElementById('patterns-grid');
    const countEl = document.getElementById('results-count');
    const remaining = grid.querySelectorAll('.chip-wrapper').length;
    countEl.textContent = remaining ? `${remaining} pattern${remaining !== 1 ? 's' : ''}` : '';
    if (!remaining) grid.innerHTML = '<p class="empty-state">No valid arrangements — check your clues.</p>';
  });

  const chip = document.createElement('div');
  chip.className = doubled ? 'pattern-chip doubled' : 'pattern-chip';
  for (const part of p.split(',')) {
    const span = document.createElement('span');
    if      (part === '__')    { span.className = 'ch-blank';  span.textContent = '_'; }
    else if (part[0] === 'g') { span.className = 'ch-green';  span.textContent = part[1]; }
    else                       { span.className = 'ch-yellow'; span.textContent = part[1]; }
    chip.appendChild(span);
  }

  wrapper.appendChild(dismissBtn);
  wrapper.appendChild(chip);
  return wrapper;
}

function renderResults(allPatterns) {
  const grid    = document.getElementById('patterns-grid');
  const countEl = document.getElementById('results-count');
  grid.innerHTML = '';

  const visible = allPatterns.filter(({ p }) => !dismissedPatterns.has(p));

  if (!visible.length) {
    grid.innerHTML = '<p class="empty-state">No valid arrangements — check your clues.</p>';
    countEl.textContent = '';
    return;
  }

  countEl.textContent = `${visible.length} pattern${visible.length !== 1 ? 's' : ''}`;
  for (const { p, doubled } of visible) {
    grid.appendChild(makeChip(p, doubled));
  }
}

/* ── DARK MODE ────────────────────────────────────────────────────── */
const darkBtn  = document.getElementById('dark-btn');
const iconMoon = document.getElementById('icon-moon');
const iconSun  = document.getElementById('icon-sun');
let dark = window.matchMedia('(prefers-color-scheme: dark)').matches;

function applyDark() {
  document.documentElement.classList.toggle('dark', dark);
  iconMoon.style.display = dark ? 'none'  : 'block';
  iconSun.style.display  = dark ? 'block' : 'none';
}
applyDark();
darkBtn.addEventListener('click', () => { dark = !dark; applyDark(); });

/* ── RESET BUTTON ─────────────────────────────────────────────────── */
document.getElementById('reset-btn').addEventListener('click', resetAll);

/* ── NUMBER KEYS 1–5 (row 0 only) ────────────────────────────────── */
document.addEventListener('keydown', e => {
  const n = parseInt(e.key);
  if (n >= 1 && n <= 5) {
    const c    = n - 1;
    const tile = document.querySelector(`#tile-row-0 [data-pos="${c}"]`);
    const inp  = tile ? tile.querySelector('input') : null;
    if (!inp) return;
    if (document.activeElement === inp) {
      if (rowsData[0][c].letter) {
        const next = rowsData[0][c].state === 'green' ? 'yellow' : 'green';
        rowsData[0][c].state = next;
        tile.dataset.state   = next;
        dismissedPatterns = new Set();
        generate();
      }
    } else {
      inp.focus();
    }
    e.preventDefault();
  }
});

/* ── INIT ─────────────────────────────────────────────────────────── */
buildUI();
setTimeout(() => focusCell(0, 0), 50);
</script>
</body>
</html>
