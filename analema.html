<script>
    var day = 3635236;

    function analema() {

        var now = new Date();
        var start = new Date(now.getFullYear(), 0, 0);
        var diff = (now - start) + ((start.getTimezoneOffset() - now.getTimezoneOffset()) * 60 * 1000);
        var oneDay = 1000 * 60 * 60 * 24;
        day = Math.floor(diff / oneDay);

        // day *= 2;
        // day += 425;

        if (day > 730) {
            day -= 730;
        }

        if (day < 10) {
            day = "00" + day;
        }
        if (day < 100) {
            day = "0" + day;
        }
        console.log('Day of year: ' + day);

        document.getElementsByTagName("img")[0].src = `./analemaimgs/analema_${day}.png`;
    }
</script>
