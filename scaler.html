<head>

	<style>
		* {
			box-sizing: border-box;
		}

		.title,
		.category {
			padding-top: 10px;
		}

		.spaced {
			padding-top: 5px;
			font-size: 1.5rem;
		}

		.recipeStepsAmt,
		.recipeStepsIng {
			font-size: x-large;
			padding: 10px;
		}

		.recipeStepsAmt {
			text-align: right;
		}

		recipeStepsIng {
			text-align: left;
		}

		label {
			font-size: larger;
		}

		legend {
			font-weight: bold;
		}

		.rightAlign {
			text-align: right;
		}

		.centerAlign {
			text-align: center;
		}

		body {
			background: url('./assets/img/ratios.svg');
			background-position: 50% 20%;
			background-size: 250%;
			background-repeat: no-repeat;
			background-color: black;
		}

		.columnHeads {
			text-align: center;
		}

		/* .syncBox {
			/* margin: 30px 10px 0px 0px; */
		/* } */

		*/ .buttonx {
			border: none;
			color: white;
			padding: 10px 20px;
			text-align: center;
			text-decoration: none;
			display: inline-block;
		}

		.notSyncButton,
		.syncButton {
			border: none;
			color: white;
			padding: 10px 20px;
			text-align: center;
			text-decoration: none;
			display: inline-block;
		}

		.notSyncButton {
			border: none;
			background-color: #078d1f;
		}

		.syncButton {
			background-color: #005e83;
		}

		.totColumn1,
		.totColumn2,
		.totColumn3 {
			padding: 0px 7px 0px 9px;
			background-color: rgba(36, 52, 36, 0.2);
		}

		/* display:flex used to live here, directly on .tColumn1/.totColumn1.
		   That's wrong: setting display:flex on a <td> overrides its built-in
		   display:table-cell, so the browser stops treating it as a real table
		   cell - it drops out of the column grid, which is what was throwing
		   off alignment between the header and the generated rows. The side-by-
		   side layout these classes wanted (checkbox + text, icon + label +
		   button) now comes from a .tColumnFlex wrapper div placed INSIDE each
		   of these cells instead, so the <td> itself stays a proper table-cell. */
		.tColumnFlex {
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.totColumn1,
		.totColumn2,
		.totColumn3,
		.totColumn4 {
			border-top-style: solid;
			border-top-color: white;
			border-top-width: 1px;
		}

		.theBlocksL,
		.theBlocksMet,
		.theBlocksSc,
		.theBlocksImp,
		.theBlocksMetPort,
		.theBlocksImpPort {
			display: block;
			width: 100%;
			padding: .375rem .75rem;
			margin: 10px 0px;
			color: white;
			border-radius: 5px;
			background: #27344e;
			border-style: hidden;
			font-size: x-large;
		}

		.tColumn1,
		.tColumn2,
		.tColumn3,
		.tColumn4,
		.tColumnPerc {
			padding: 0px 8px 0px 8px;
		}

		/* ---- Ingredients table column grid ----
		   table-layout:fixed + a matching <colgroup> means every row (header,
		   ingredient rows, totals, portions) shares one real 6-column grid:
		   Ingredient | ~5|1 | % | g | Oz | Scaled
		   The min-widths below are a floor: columns shrink together with the
		   viewport but never below a size where the numbers become unreadable.
		   Past that floor, .table-responsive's horizontal scroll takes over
		   instead of squashing the text. */
		.XtableIt {
			table-layout: fixed;
			border-collapse: collapse;
			width: 100%;
		}

		.XtableIt col.colLabel {
			width: 38%;
		}

		.XtableIt col.colFives {
			width: 7%;
		}

		.XtableIt col.colPerc {
			width: 10%;
		}

		.XtableIt col.colMet {
			width: 16%;
		}

		.XtableIt col.colImp {
			width: 14%;
		}

		.XtableIt col.colScale {
			width: 15%;
		}

		.tColumn1 {
			min-width: 130px;
		}

		.tColumnPerc {
			min-width: 56px;
		}

		.tColumn2,
		.tColumn3,
		.tColumn4 {
			min-width: 78px;
		}

		@media (max-width: 480px) {

			.tColumn1,
			.tColumn2,
			.tColumn3,
			.tColumn4,
			.tColumnPerc {
				padding: 0px 4px 0px 4px;
			}

			.tColumn1 {
				min-width: 100px;
			}

			.tColumnPerc {
				min-width: 46px;
			}

			.tColumn2,
			.tColumn3,
			.tColumn4 {
				min-width: 64px;
			}
		}

		.asyncer {
			padding: 0px 8px 0px 8px;
			display: flex;
		}

		.button-toolbar {
			display: flex;
			flex-wrap: wrap;
			gap: 0.35rem;
			align-items: center;
			justify-content: flex-start;
		}

		.button-toolbar .btn {
			margin: 0;
			flex: 0 1 auto;
			min-width: 90px;
			max-width: 160px;
			padding: 0.35rem 0.7rem;
			white-space: nowrap;
		}

		/* NOTE: these three run narrowest-last on purpose. Max-width media queries
		   overlap (a 500px screen matches all three), and when two rules have equal
		   specificity, CSS just uses whichever comes later in the file - it does NOT
		   automatically prefer the "more specific" breakpoint. Previously the 520px
		   rule was placed before the 700px rule, so on screens under 520px the browser
		   correctly matched both, but the 700px rule (last in the file) silently won -
		   giving 2-buttons-per-row instead of the intended full-width stacked buttons. */
		@media (max-width: 760px) {
			.button-toolbar {
				justify-content: center;
			}

			.button-toolbar .btn {
				flex: 1 1 auto;
				min-width: 0;
				max-width: none;
			}
		}

		@media (max-width: 700px) {
			.button-toolbar .btn {
				flex: 1 1 45%;
				min-width: 0;
			}
		}

		@media (max-width: 520px) {
			.button-toolbar .btn {
				flex: 1 1 100%;
			}
		}

		.darkened {
			color: #42587f;
		}

		ul,
		ol {
			font-size: 20px;
		}

		blockquote {
			padding-top: 20px;
		}

		li {
			padding-top: 13px;
		}

		.attributeHeaders {
			font-size: 1.8rem;
			padding: 8px 17px 0px 17px;
		}

		@media (min-width: 1000px) {
			body {
				font-size: 1.4em;
			}

			.columnHeads {
				font-size: 1.8em;
			}
		}


		@media (max-width: 999px) {
			body {
				font-size: 1rem;
			}

			.columnHeads {
				font-size: 1.5em;
			}

			.theBlocksL,
			.theBlocksMet,
			.theBlocksImpPort,
			.theBlocksMetPort {
				font-size: 1.5em;
			}
		}

		@media (max-width: 600px) {
			body {
				font-size: .75em;
			}

			.columnHeads {
				font-size: .75em;
			}

			.theBlocksL,
			.theBlocksMet,
			.theBlocksMetPort,
			.theBlocksImpPort {
				font-size: .75em;
			}
		}
	</style>

									</td>

					<!--* Scaling Area -->
					<div class="row justify-content-md-center" id="scalerArea" style="border-top: none;">

						<div class="col row">

						</div>
						<div class="col row">
							<label for="newScale" class="spaced col col-form-label" style="text-align: right;">Scaled</label>

								<input class="theBlocksL rightAlign" type="number" min="1" value="1" id="newScale" oninput="multiChange(2);" onclick="this.select();">
							</div>
						</div>
						<div class="col row">
							<label for="multiplier" class="spaced col col-form-label" style="text-align: right;">Multiplier</label>

								<input class="theBlocksL rightAlign" type="number" value="1" min="1" id="multiplier" oninput="multiChange(3);" onclick="this.select();">
							</div>
						</div>
					</div>

					<!--* Recipe Steps Area -->
					<div class="form-row" style="margin-top: 0px; display:block; background-color: #08142eaa; padding: 27px;">
