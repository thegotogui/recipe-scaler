<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/scripts.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
        crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous">
        </script>

    <link rel="icon" type="image/svg+xml" href="/assets/img/measurator2.svg">


    <title>Measurator</title>
    <style>
        .form-text {
            color: white;
        }

        .form-control {
            background-color: #333;
            color: white;
            text-align: center;
        }

        .col-form-label,
        .form-label {
            font-size: x-large;
        }

        .radioTune {
            padding-bottom: 8px;
        }

        .mb-3,
        .mb-6,
        .col-lg-4 {
            background-color: rgb(60, 60, 60);
            padding: 10px 10px 10px 10px;
            border-radius: 15px;

        }
    </style>
    <!-- <link rel="stylesheet" href="css/nav.css"> -->
    <link rel="stylesheet" href="css/navigation.css">


</head>

<body onload="initializeIt('Measurator', './assets/img/measurator2.svg'), getWeight(1);" style="background-color: #2d2d2d; color: white;">

    <div id="navHead">
    </div>

    <div class="container" style="margin-top: 20px;">
        <!-- <div class="col-12" style="margin: 0, auto; display: flex; padding-top: 10px; border-radius: 10px;"> -->
        <div class="row justify-content-center">
            <div class="col-2 form-check form-check-inline">
                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="wetRadio" value="option1" checked=true; onclick="getWeight(1)">
                <label class="form-check-label radioTune" for="inlineRadio1">Wet</label>
            </div>
            <div class="col-2 form-check form-check-inline">
                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="saltRadio" value="option2" onclick="getWeight(1)">
                <label class="form-check-label radioTune" for="inlineRadio2">Salt</label>
            </div>
            <div class="col-2 form-check form-check-inline">
                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="sugarRadio" value="option3" onclick="getWeight(1)">
                <label class="form-check-label radioTune" for="inlineRadio3">Flour</label>
            </div>
        </div>
        <!-- </div> -->
        <div class="row justif-content-md-center" style="margin-top: 10px;">
            <div class="col md-auto"></div>
            <div class="col col-lg-3">
                <label for="inGrams" class="col-form-label">Grams</label><input type="number" id="inGrams" class="form-control" aria-describedby="passwordHelpInline" value="100"
                    oninput="getWeight(1);">
            </div>
            <div class="col col-lg-3">
                <label for="inPounds" class="col-form-label">Pounds</label><input type="number" id="inPounds" class="form-control" aria-describedby="passwordHelpInline" oninput="getWeight(3);">
                <label for="inOunces" class="col-form-label">Ounces</label><input type="number" id="inOunces" class="form-control" aria-describedby="passwordHelpInline" oninput="getWeight(2);">
            </div>
            <div class="col md-auto"></div>
        </div>

        <!-- Bigger containers-->
        <div class="row justify-content-md-center" style="margin-top: 50px;">
            <div class="col">
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Gallons</label>
                    <input type="number" class="form-control" id="gals" oninput="getScoops();">
                    <img src="./portionator/assets/img/blank.svg" width="60px" height="60px" style="margin:0 auto;">
                </div>
            </div>
            <div class="col">
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Quarts</label>
                    <input type="number" class="form-control" id="quarts" oninput="getScoops();">
                    <img src="./portionator/assets/img/blank.svg" width="60px" height="60px" style="margin:0 auto;">

                </div>
            </div>
            <div class="col">
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Pints</label>
                    <input type="number" class="form-control" id="pints" oninput="getScoops();">
                    <img id="tester" src="./portionator/assets/img/blank.svg" width="60px" height="60px">
                </div>
            </div>
        </div>

        <!-- Cup families-->
        <div class="row" style="margin-top: 10px;">
            <div class="col">
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Cups</label>
                    <input type="number" class="form-control" id="cups" oninput="getScoops();">
                    <img src="./portionator/assets/img/blank.svg" width="60px" height="60px">
                </div>
            </div>
            <div class="col">
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">1/2 Cups</label>
                    <input type="number" class="form-control" id="hcups" oninput="getScoops();">
                    <img src="./portionator/assets/img/blank.svg" width="60px" height="60px">
                </div>
            </div>
            <div class="col">
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">1/3 Cups</label>
                    <input type="number" class="form-control" id="tcups" oninput="getScoops();">
                    <img src="./portionator/assets/img/blank.svg" width="60px" height="60px">
                </div>
            </div>
            <div class="col">
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">1/4 Cups</label>
                    <input type="number" class="form-control" id="qcups" oninput="getScoops();">
                    <img src="./portionator/assets/img/blank.svg" width="60px" height="60px">
                </div>
            </div>
        </div>

        <!-- Spoons and Dump -->
        <div class="row" style="margin-top: 10px;">
            <div class="col">
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Tbsps</label>
                    <input type="number" class="form-control" id="tbsp" oninput="getScoops();">
                    <img src="./portionator/assets/img/blank.svg" width="60px" height="60px">
                </div>
            </div>
            <div class="col">
                <div class="mb-3">
                    <label for="tsp" class="form-label">Tsps</label>
                    <input type="number" class="form-control" id="tsp" oninput="getScoops();">
                    <img src="./portionator/assets/img/blank.svg" width="60px" height="60px">
                </div>
            </div>
            <div class="col">
                <div class="mb-3">
                    <label for="remainder" class="col-form-label">Remainder</label>
                    <input type="number" id="remainder" class="form-control">
                    <img src="./portionator/assets/img/blank.svg" width="60px" height="60px">
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous">
        </script>
    <script src="js/measurator.js" async></script>
    <script src="js/scripts.js" async></script>
</body>

</html>
